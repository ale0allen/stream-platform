server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: stream-platform-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stream_platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  messages:
    basename: messages
    encoding: UTF-8

app:
  jwt:
    secret: ${JWT_SECRET:ZmFrZXNlY3JldGtleWZvcmxvY2FsZGV2ZWxvcG1lbnRvbmx5MTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${FRONTEND_URLS:http://localhost:5173,http://127.0.0.1:5173}
  oauth:
    twitch:
      client-id: ${TWITCH_CLIENT_ID:}
      client-secret: ${TWITCH_CLIENT_SECRET:}
      redirect-uri: ${TWITCH_REDIRECT_URI:http://localhost:8080/api/stream-accounts/oauth/twitch/callback}
      scopes: ${TWITCH_SCOPES:user:read:email}
      state-secret: ${TWITCH_STATE_SECRET:ZmFrZXN0YXRlc2VjcmV0Zm9ybG9jYWxvbmx5MTIzNDU2Nzg5}
      frontend-redirect-base-url: ${FRONTEND_PUBLIC_URL:http://localhost:5173}
